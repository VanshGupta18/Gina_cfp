openapi: 3.0.0
info:
  title: Gina — E2E Tests
  description: >-
    Complete end-to-end test suite for the Gina backend API (12 endpoints).


    ## Endpoint coverage

    | # | Method | Path | Folder |

    |---|--------|------|--------|

    | 1 | GET | /health | 1 — Health |

    | 2 | POST | /api/users/sync | 2 — Users |

    | 3 | GET | /api/datasets | 3 — Datasets |

    | 4 | POST | /api/datasets/upload | 3 — Datasets |

    | 5 | GET | /api/datasets/:id/semantic | 3 — Datasets |

    | 6 | PATCH | /api/datasets/:id/semantic | 3 — Datasets |

    | 7 | GET | /api/datasets/:id/conversations | 4 — Conversations |

    | 8 | POST | /api/datasets/:id/conversations | 4 — Conversations |

    | 9 | GET | /api/conversations/:id/messages | 6 — Messages |

    | 10 | POST | /api/query | 5 — Query Pipeline |

    | 11 | POST | /api/snapshot/toggle | 7 — Snapshot Mode |

    | 12 | (negative cases) | various | 8 — Error Cases |


    ## Setup

    1. Import `Gina_Environment.postman_environment.json`

    2. Select **Gina — Local Environment**

    3. Start the backend on port 3001

    4. Run **0 — Bootstrap › Create Test User & Get JWT** first

    5. Run the collection sequentially — IDs auto-chain via test scripts


    ## Upload test

    The upload request (3 — Datasets › Upload CSV) ships a small inline CSV in
    the pre-request script so you don't need an external file.
  version: 1.0.0
servers:
  - url: http://{{supabaseurl}}
  - url: http://{{baseurl}}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    noauthAuth:
      type: http
      scheme: noauth
tags:
  - name: 0 — Bootstrap
  - name: 1 — Health
  - name: 2 — Users
  - name: 3 — Datasets
  - name: 4 — Conversations
  - name: 5 — Query Pipeline (SSE)
    description: >-
      POST /api/query returns Server-Sent Events. Postman captures the full SSE
      body — tests parse data: lines for step and result events.
  - name: 6 — Messages
  - name: 7 — Snapshot Mode
    description: >-
      Toggle ON → fire all 6 scripted snapshot queries → verify non-matching
      falls through → toggle OFF.
  - name: 8 — Error Cases
    description: >-
      Negative tests — verify the API rejects bad input with correct status
      codes.
paths:
  /auth/v1/token:
    post:
      tags:
        - 0 — Bootstrap
      summary: Create Test User & Get JWT
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                email: '{{testEmail}}'
                password: '{{testPassword}}'
